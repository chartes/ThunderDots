name: CI

on:
  push:
    branches:
      - main
      - master
      - "release/*"
  pull_request:
    branches:
      - main
      - master

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install Ruff
        run: uv tool install ruff

      - name: Ruff check
        run: ruff check thunderdots

      - name: Ruff format check
        run: ruff format --check thunderdots

  build-go:
    name: Build Go shared lib (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      GO_VERSION: "1.22"
      GO_CMD_DIR: "thunderdots/native/go/cmd/thunderdots"
      OUT_DIR: "thunderdots/native/build"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Prepare build dir
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${OUT_DIR}"

      # Linux + macOS (bash)
      - name: Build (linux/mac)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: ${{ env.GO_CMD_DIR }}
        run: |
          set -euo pipefail

          if [ "${{ runner.os }}" = "macOS" ]; then
            OUT="../build/libthunderdots.dylib"
          else
            OUT="../build/libthunderdots.so"
          fi

          # build in the module directory
          go mod tidy
          go build -buildmode=c-shared -o "$OUT"

          echo "Built: $OUT"
          ls -la ../build

      # Windows (pwsh) - IMPORTANT: build inside the module directory
      - name: Build (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: ${{ env.GO_CMD_DIR }}
        run: |
          New-Item -ItemType Directory -Force ..\build | Out-Null

          # go mod tidy inside module
          go mod tidy

          # On Windows, c-shared produit .dll + .h (et parfois .a)
          go build -buildmode=c-shared -o ..\build\thunderdots.dll

          "Built files:"
          Get-ChildItem ..\build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thunderdots-native-${{ runner.os }}
          path: |
            thunderdots/native/build/*
          if-no-files-found: error

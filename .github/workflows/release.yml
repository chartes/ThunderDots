name: Release to PyPI

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  pypi-release:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/thunderdots/

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Check release tag format
        run: |
          uv run python - <<'PY'
          import os
          import re

          tag = os.environ["GITHUB_REF_NAME"]

          if not re.fullmatch(r"v\d+\.\d+\.\d+([a-zA-Z0-9.\-]+)?", tag):
              raise SystemExit(
                  f"Invalid release tag '{tag}'. Expected something like v0.1.0"
              )

          print(f"Release tag format OK: {tag}")
          PY

      - name: Build package
        run: uv build

      - name: Check built package version
        run: |
          uv run python - <<'PY'
          import os
          import zipfile
          from pathlib import Path
          from email.parser import Parser

          tag = os.environ["GITHUB_REF_NAME"]
          expected = tag[1:] if tag.startswith("v") else tag

          wheels = list(Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel found in dist/")

          wheel = wheels[0]
          with zipfile.ZipFile(wheel) as zf:
              metadata_name = next(
                  name for name in zf.namelist()
                  if name.endswith(".dist-info/METADATA")
              )
              metadata = Parser().parsestr(
                  zf.read(metadata_name).decode("utf-8")
              )

          actual = metadata["Version"]

          if actual != expected:
              raise SystemExit(
                  f"Built package version '{actual}' does not match release tag '{tag}'"
              )

          print(f"Built package version OK: {actual}")
          PY

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1